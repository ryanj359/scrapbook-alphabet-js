<!DOCTYPE html>
<html lang="en">
  <head>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Aladin&family=Almendra+Display&family=Almendra+SC&family=Grenze+Gotisch:wght@100..900&family=Macondo&family=MedievalSharp&family=Metamorphous&family=Modern+Antiqua&family=New+Rocker&family=UnifrakturMaguntia&display=swap" rel="stylesheet">
    <link rel="stylesheet" type="text/css" href="style.css">
    <meta charset="utf-8" />

  </head>
  <body>
    <main>
      <h1> <a href="index.html" class="h1"> Scrapbook Alphabet </a></h1>
      <h2 class="h2"> Text Box: </h2>
      <div id="container">
        <div>
          <button onclick="location.href='serifTextBox.html'" class="button"> Serif </button>
          <br>
          <button onclick="location.href='sansSerifTextBox.html'" class="button"> Sans Serif </button>
          <br>
          <button onclick="location.href='oldTimeyTextBox.html'" class="button" style="color: red;"> Old Timey </button>
          <br>
          <button onclick="location.href='futuristicTextBox.html'" class="button"> Futuristic </button>
          <br>
          <button onclick="location.href='funkyTextBox.html'" class="button"> Funky </button>
        </div>

        <div>
          <button onclick="location.href='oldTimeyTextBoxFullType.html'" class="button"> Size, Color, & Type Face </button>
          <br>
          <button onclick="location.href='oldTimeyTextBoxTypeStyle.html'" class="button" style="color: red;"> Type Face & Color </button>
          <br>
          <button onclick="location.href='oldTimeyTextBoxTypeSize.html'" class="button"> Type Face & Size </button>
          <br>
          <button onclick="location.href='index.html'" class="button"> Home </button>
        </div>
        <div>
            <button onclick="location.href='oldTimeyTextBoxTypeStyleBW.html'" class="button"> Black & White </button>
            <br>
            <button onclick="location.href='oldTimeyTextBoxTypeStyleColor.html'" class="button" style="color: red;"> Color </button>
        </div>
        <div> 
            <button id="bttn" class="button">Randomize</button>
            <br>
            <button onclick="location.href='oldTimeyTextBoxTypeStyleColor.html'" class="button"> Reset </button>
        </div>
      </div>

      <br>
      <br>
      <br>
      
      <input type="text" id="inputText" placeholder="Type something..." class="textBox"/>
      <div id="outputText" style="font-size: 100pt;"></div>
      
    </main>
    <script src="oldTimeyTextBoxTypeStyleColorSketch.js"></script>

</html>
