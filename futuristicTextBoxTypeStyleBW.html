<!DOCTYPE html>
<html lang="en">
  <head>
    <link rel="preconnect" href="https://fonts.googleapis.com">

        <div>
          <button onclick="location.href='serifTextBox.html'" class="button"> Serif </button>
          <br>
          <button onclick="location.href='sansSerifTextBox.html'" class="button"> Sans Serif </button>
          <br>
          <button onclick="location.href='oldTimeyTextBox.html'" class="button"> Old Timey </button>
          <br>
          <button onclick="location.href='futuristicTextBox.html'" class="button" style="color: red;"> Futuristic </button>
          <br>
          <button onclick="location.href='funkyTextBox.html'" class="button"> Funky </button>
        </div>
        
        <div>

        <div>

            <br>
            <button onclick="location.href='futuristicTextBoxTypeStyleColor.html'" class="button"> Color </button>
        </div>
        <div>

            <button onclick="location.href='futuristicTextBoxTypeStyleBW.html'" class="button"> Reset </button>
          </div>

      <br>
      <br>
      <br>

    <script src="futuristicTextBoxTypeStyleBWSketch.js"></script>
